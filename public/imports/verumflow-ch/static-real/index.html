<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>VerumFlow — Sistemi gestionali su misura, in 14 giorni</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="page.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="section-nav-hero.jsx"></script>
<script type="text/babel" src="section-process-chisiamo.jsx"></script>
<script type="text/babel" src="section-servizi-cases.jsx"></script>
<script type="text/babel" src="section-stack-testimonials.jsx"></script>
<script type="text/babel" src="section-faq-cta-footer.jsx"></script>

<script type="text/babel">
  const App = () => {
    const [toast, setToast] = React.useState(null);
    const onCta = (label) => {
      setToast(label || "Demo · VerumAudit booking opens here");
      setTimeout(() => setToast(null), 2400);
    };
    React.useEffect(() => {
      const tick = () => window.lucide && window.lucide.createIcons();
      tick();
      const id = setInterval(tick, 500);
      setTimeout(() => clearInterval(id), 4000);
    }, []);

    return (
      <>
        <Nav onCta={onCta} />
        <Hero onCta={onCta} />
        <Processo />
        <ChiSiamo onCta={onCta} />
        <Servizi onCta={onCta} />
        <CaseStudies />
        <Stack />
        <Testimonials />
        <FAQ />
        <FinalCTA onCta={onCta} />
        <Footer onCta={onCta} />

        {toast && (
          <div className="vf-toast">{toast}</div>
        )}
      </>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
