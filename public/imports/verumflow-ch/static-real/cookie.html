<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Cookie Policy — VerumFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="page.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="vf-typeset">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="page-layout.jsx"></script>
<script type="text/babel">
  const Page = () => {
    React.useEffect(() => { const t = () => window.lucide && window.lucide.createIcons(); t(); const id = setInterval(t, 500); setTimeout(() => clearInterval(id), 3000); }, []);
    return (
      <div>
        <PageNav />
        <PageHero overline="Legale" title="Cookie Policy" sub="Usiamo solo cookie tecnici necessari. Niente tracker pubblicitari." />
        <section style={{ padding: "0 32px 100px" }}>
          <div style={{ maxWidth: 760, margin: "0 auto" }} className="vf-typeset">
            <h2>Cosa sono i cookie</h2>
            <p>I cookie sono piccoli file di testo memorizzati dal tuo browser per tracciare lo stato di una sessione web.</p>

            <h2>Cookie usati su questo sito</h2>
            <p>Il sito VerumFlow usa esclusivamente <strong>cookie tecnici di prima parte</strong>, necessari al funzionamento. Non richiedono consenso ai sensi del GDPR/nFADP.</p>
            <ul>
              <li><code>vf_session</code> — sessione utente, eliminato alla chiusura del browser.</li>
              <li><code>vf_prefs</code> — preferenze interfaccia (tema, lingua), 12 mesi.</li>
            </ul>

            <h2>Cookie di terze parti</h2>
            <p>Non utilizziamo cookie di profilazione, advertising, o social network. Nessun pixel di tracciamento.</p>

            <h2>Analytics</h2>
            <p>Usiamo analytics rispettoso della privacy (Plausible / Umami self-hosted) che non richiede cookie e non profila utenti.</p>

            <h2>Come gestire i cookie</h2>
            <p>Puoi cancellare o bloccare i cookie dalle impostazioni del tuo browser. Bloccare i cookie tecnici può impedire il corretto funzionamento del sito.</p>

            <h2>Aggiornamenti</h2>
            <p>Eventuali modifiche saranno pubblicate su questa pagina. Ultimo aggiornamento: 6 maggio 2026.</p>
          </div>
        </section>
        <PageFooter />
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
