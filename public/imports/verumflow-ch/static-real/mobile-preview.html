<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>VerumFlow — Mobile Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0F1113; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #F2F2F2; overflow: hidden; }
  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .frame {
    position: relative;
    width: 390px; height: 844px;
    border-radius: 48px;
    background: #000;
    padding: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 2px #1a1a1a;
    flex-shrink: 0;
  }
  .frame::before {
    content: ""; position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 32px; border-radius: 999px; background: #000; z-index: 2;
  }
  iframe {
    width: 100%; height: 100%; border: 0; border-radius: 36px;
    background: #fff;
  }
  .label {
    position: fixed; top: 16px; left: 16px;
    font: 500 12px/1 -apple-system, sans-serif;
    color: rgba(242,242,242,0.6);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="label">VerumFlow — Mobile (390 × 844)</div>
<div class="stage">
  <div class="frame">
    <iframe src="mobile/index.html" title="VerumFlow Mobile"></iframe>
  </div>
</div>
</body>
</html>
